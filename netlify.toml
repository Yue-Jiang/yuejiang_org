# Netlify build configuration.
# HUGO_VERSION pins the build to a modern Hugo (the old site built on 0.24.1);
# keep this in sync with .tool-versions.
[build]
  publish = "public"
  command = "hugo --gc --minify"

[build.environment]
  HUGO_VERSION = "0.163.3"

# Production (main) uses the baseURL from config.toml (https://yuejiang.org/).
# On deploy previews and branch deploys, override baseURL to the temporary
# Netlify URL so internal/nav links stay within the preview instead of
# bouncing to the live production site.
[context.deploy-preview]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"
